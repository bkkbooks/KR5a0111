body:
  text: 黄帝陰符經疏序周一少室山達觀子李筌好神仙之道常歷名山博采方術至嵩山虎口巖石壁中得陰符本絹素書朱漆軸以絳繒緘之封云魏眞君二年七月七日上清道士寇謙之藏諸名山用傳同好其本糜爛應乎灰滅筌略抄記雖誦在口竟不能曉其義理因入秦至驪山下逢一老母髽髻當頂餘髮倒垂弊衣扶仗路傍見遺火燒樹自語曰火生於木禍發必剋筌驚而問之曰此是黄帝陰符上文母何得而言母曰吾受此符三元六甲周甲子矣謹按太一遁甲經云一元六十歲行一甲子三元行一百八十歲三甲子爲一周六周積算一千八十歲年少從何而知筌稽首再拜具告得處母笑曰年少顴頰貫於生門命輪齊於月角血腦未減心影不偏性賢而好法神勇而樂智是吾弟子也然五十六年當有大厄因出丹書符冠杖端刺筌口令跪而吞之曰天地相保乃坐樹下說陰符玄義言竟誡筌曰黄帝陰符三百言百言演道百言演法百言演術參演其三混而爲一聖賢智愚各量其分得而學之矣上有神仙抱一之道中有富國安人之法下有强兵戰勝之術聖人學之得其道賢人學之得其法智人學之得其術小人學之受其殃識分不同也皆内出於天機外合於人事若巨海之朝百谷止水之含萬象其機張包宇宙括九夷不足以爲大其機彌隱微塵納芥子不足以爲小觀其精微黄庭八景不足以爲學察其至要經傳子史不足以爲文任其巧智孫吴韓白不足以爲奇是以動植之性成敗之數死生之理無非機者一名黄帝天機之書九竅四肢不具慳貪愚癡風癇狂誑者並不得聞如傳同好必清齋三日不擇卑幼但有本者爲師不得以富貴爲重貧賤爲輕違者奪二十紀河圖洛書云黄帝曰聖人生天帝賜算三萬六千七百二十紀主一歲若有過司命輒奪算算盡奪紀紀盡則身死有功德司命輒與算算得與紀紀得則身不死長生矣每年七月七日寫一卷藏諸名山巖石間得算一千二百本命日誦七遍令人多智慧益心機去邪魅銷灾害出三尸下九虫所以聖人藏之金匱不妄傳也母語畢日已晡矣曰吾有麥飯相與爲食因袖中出一瓠令筌取水筌往谷中盛水其瓠忽重可百餘斤力不能制便沉於泉隨覓不得乆而却來已失母所在唯留麥飯一升筌悲泣號訴至夕不復見筌乃食麥飯而歸漸覺不飢至令能數日不食亦能一日數食氣力自倍筌所注陰符並依驪山母所說非筌自能後來同好敬爾天機無妄傳也
