front:
  text: 黄帝陰符經疏卷中閏二
  hash: sha256:b3c9bae3fe63bd2479288d9dfadd3f41f71b4714cbdfcdffdb30b41fe2775f5b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0111_HFL_002-001a, image: hfl/0055/0055-036.png}
body:
  text: 少室山李筌䟽富國安人演法章天地萬物之盗天覆地載萬物潛生冲炁暗滋故曰盗也䟽曰天地者陰陽也陰陽二字洎乎五行共成其七此外更改於物則何惑之甚矣言天地萬物胎卵濕化百穀草木悉承此七炁而生長從无形至於有形潛生覆育以成其體如行竊盗不覺不知天地亦潛與其炁應用无窮萬物私納其覆育各獲其安故曰天地萬物之盗萬物人之盗萬物盗天而長生人盗萬物以資身若知分合宜亦然之理䟽曰人與禽獸草木俱禀陰陽而生人之最靈位處中宫心懷智度能反照自性窮達本始明會陰陽五行之炁則而用之周易六十四卦六十甲子是也故上文云見之昌也人於七炁之中所有生成之物悉能潛取以資養其身故言盜則田蠶五穀之類是也列子曰齊有國氏大富云吾善爲盜矣天有時地有利吾盜天地之時利雨澤之滂潤吾陸盜禽獸水盜魚鱉吾始爲盜一年而給二年而足三年大穰自此以後施及州閭吾盜天地而无殃咎若人盜人之金帛奈何无辜乎萬物盜天地以生成國氏盜萬物以資身但知分合宜亦自然之理此萬物人之盜也人萬物之盜也三盜既宜三才既安既盡也三盜盡合其宜則三才盡興其任䟽曰言人但能盜萬物資身以充榮禄富貴殊不知萬物反能盜人以生禍患言上來三義更相爲盜者亦自然之理凡此相盜其中皆須有道愜其宜則吉乖其理則凶故列子言盜亦有道乎何適其无道也見室中之藏聖也知可否智也入先勇也出後義也分均仁也人无此五德而能行盜者未之有也此盜中之道也向於三盜之中皆須有道令盡合其宜則三才不差盡安其任矣皆不令越分傷性以生禍患者也故曰食其時百骸理動其機萬化安言人飲食不失其時則身无患咎興動合其機宜則萬化皆安矣疏曰言人理性命者皆須飲食滋味也故左傳曰味與道炁炁以實志滋形潤神必歸飲食黄帝曰人服飲食必先五味五肉五菜五菓皆須調候得所量體而進熟則益人生則傷臟此食時之義也故使飲食不失其時滋味不越其宜適其中道不令乖分傷性則四肢調暢五臟安和无諸疾病長壽保終豈不爲百骸理乎故亢倉子曰冬飽則身温夏飽則身凉温凉時適則人无疾疢疫癘不行得終其天年故曰穀者人之天也天所以興王務農王不務農是棄人也人既棄之將何有國哉但三盗既合其宜三才盡安其任此皆合自然之理然後須明君賢臣調御於世乘此既宜盡安之時當須法令平正用賢使能仁及昆蟲化被草木舉頭皆合於天道之機宜則陰陽順時寰宇清泰使萬民之類皆獲其安寧此則動其機而萬化安故云中有富國安人之法也人知其神而神不知不神所以神也陰陽生萬物人謂之神不知有至道靜默而不神能生萬物陰陽爲至神矣疏曰神者妙而不測也易曰陰陽不測謂之神人但見萬物從陰陽日月而生謂之曰神殊不知陰陽日月從不神而生焉不神者何也至道也言至道虚靜寂然而不神此不神之中能生日月陰陽三才萬物種種滋榮而獲安暢皆從至道虚靜中來此乃不神之中而有神矣其理明矣飲食修鍊之士明悟无爲不神之理反照正性而修無爲之業存思守一反朴還淳歸無爲之道玄之又玄方證寂默而不神此則不神而能至神故曰明矣日月有數大小有定聖功生焉神明出焉日月運轉不差度數大小有定方顯聖功之力生焉神明之功出焉䟽曰日月者陰陽之精炁也六合之内爲至道也日月度數大小律曆之所辯咸有定分運轉不差故云日月有數大小有定聖功生焉者六合之内賴此日月照燭陰陽運行而生成萬物有動植功力微妙至於聖故曰聖功生焉神明出焉者陰陽不測之謂神日月晶朗之謂明言陰陽之神日月至明故曰神明言天地萬物皆承聖功神明而生有從无出有功用顯著故曰神明出焉又言世間萬物皆禀此聖功而生大之與小咸有定分不相違越則小不羡大大不輕小故莊子言鵬鷃各自逍遥不相繾羡此大小有定之義又言上至王侯下至黎庶各有定分不相傾奪上下和睦歲稔時雍名曰太平故曰中有富國安人之法其盜機也天下莫不能見莫不能知君子得之固躬小人得之輕命盜機深妙易見難知君子知積善之機乃能固躬小人務榮辱之機而輕命也䟽曰盜機者重舉上文三盜之義也假如國氏盗天而獲富人皆見種植之機不知其所獲之深理何名爲盗機縁己之先无知彼之先有暗設計謀而動其機數不知不覺竊盗將來以潤其己名曰盗機言天下之人咸共見此盜機而莫能知其深理設有智者小人君子所見不同君子則知固躬之機小人則知輕命之機固躬之機者君子知至道之中包含萬善所求必致如響應聲但設其善計暗默修行動其習善之機與道契合乃致守一存思精心念習竊其深妙以滋其性或盗神水華池玉英金液以致神仙賢人君子知此妙道之機修鍊以成聖人故曰君子得之固躬矣小人得之輕命者但務營求金帛不憚劬勞或修才學武藝不辭疲瘁飾情巧智以求世上浮榮之機或榮華寵辱或軍旅傾敗貪婪損己或耽財好色雖暫得浮榮終不免於患咎蓋爲不知其妙道之機以致於此故曰小人得之輕命也此富國安人演法章中九十二言皆使人取捨合其機宜明察神明之道安化養命固躬之機也故曰中有富國安人之法也讚曰天地萬物陰陽四時更相爲盗貴合天機聖功神明非賢莫知固躬輕命審察其宜黄帝陰符經疏卷中
