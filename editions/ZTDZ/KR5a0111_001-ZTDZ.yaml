front:
  text: 黄帝陰符經疏卷上
  hash: sha256:28e68ade3acf188f51993b80a1443cde96ff37e658486554fddbdf729059b4b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0111_SJB_001-020737a, image: sjb/02/020737a.png}
body:
  text: 少室山李筌疏釋題陰闇也符合也天機闇合於行事之機故曰陰符神仙抱一演道章觀天之道執天之行盡矣但觀天道而理執天之道則陰陽動靜之宜盡矣疏曰天者陰陽之總名也陽之精炁輕清上浮爲天陰之精炁重濁下沉爲地相連而不相離故列子禦寇謂杞國人曰天積炁耳地積塊耳自地已上則皆天也子終日行於天奈何憂乎天崩故知天地則陰陽之二炁炁中有子名曰五行五行者天地陰陽之用也萬物從而生焉萬物則五行之子也故使人觀天地陰陽之道執天五炁而行則興廢可知生死可察除此外無可觀執故言盡矣天有五賊見之者昌五賊在心施行于天宇宙在乎手萬物生乎身天生五行謂之五賊使人用心觀執奉天而行則宇宙在乎掌中萬物生乎身上矣疏曰五賊者五行之炁也則金木水火土焉太公注云聖人爲之五賊天下爲之五德人食五味而死無有死而棄之者此五賊之義所言賊者害也逆之不順則與人生害故曰賊也此言陰陽之中包含五炁故云天有五賊五者在天爲五星在地爲五嶽在位爲五方在物爲五色在聲爲五音在食爲五味在人爲五臟在道爲五德不善用之則爲賊又賊者五行更相制伏遞爲生殺晝夜不停亦能盗竊人之生死萬物成敗故言賊也見之者昌何也人但能明此五行制伏之道審陰陽興廢之源則而行之此爲見也如人審五賊善能明之則爲福德之昌盛也又人能知五賊藏者何也在其心故曰五賊在心心既知之故使人用心觀執五炁而行睹逆順而不差合天機而不失則宇宙在乎掌中萬物生乎身上如此則吉無不利與道同遊豈不爲昌乎在仕宦之道執仁義禮智信則富貴榮華豈不爲昌乎在軍旅之道明五行逆順則戰取必勝豈不爲昌乎故曰見之者昌也但因此五行相生而用之則爲道德合於陽也相剋之道用之則爲賊害合於陰也故三教大師皆用理世所立經教只言修善而稱道德不令修惡而稱賊害也故知善修道德者道也是陽之主也陰惡賊害者魔也是陰之精除此之外百萬經教虚廣故也故宣尼云一言以蔽之曰思無邪又曰擇其善者而從之其不善者而改之此則至道也何必廣談修習歟合道之體不出此門能知天地陰陽成敗之元者皆在陰符首章而盡理矣世人見文少而言近自不閑其要妙亦何在三教經書廣博所陳也故驪山母云觀其精理黄庭八景不足以爲學察其至要經傳子史不足以爲文任其巧智孫吴韓白不足以爲奇此之義也天性人也人心機也立天之道以定人也言以立天定人在乎五贼䟽曰夫人心主魂之官身爲神之府也將欲施行五賊者莫尚乎心故心能之士有所圖必合天道此則宇宙雖廣觀覽只在手中萬物雖多生殺不出於術内故曰心正可以辟邪也天發殺機龍蛇起陸人發殺機天地反覆天人合發萬變定機天發殺機公道也人發殺機私情也龍蛇感公道而震私情紊亂天地而反覆天人俱合於公道則千變萬化無不定矣䟽曰天含五炁遞爲生殺自然有之天道生殺皆合其機宜不妄發動陰陽改變時代遷謝去故就新此天發殺機皆至公也乘天威殺之機或龍或蛇沉隱之類皆能震起於陵陸順天應時暢達於其間爲乘天之機不失其宜也人發殺機天地反覆者人是五行之子須順五炁之生殺任陰陽之陶運何得擅自興其生殺乎至如世間之法殺人者死殺生者罪何也爲非天之合殺彼人奈何殺之乎言人不合妄動殺機也至如奸臣逆節違背天道反叛君親恣行凶惡損害於世擅行屠戮妄動殺機者同翻天作地覆地作天如此之大亂爲逆天之大禍是名天地反覆此則人怨神怒天將誅之人共殺之俱合其殺機是名天人合發萬變定基罰叛討逆順天行誅皆合天殺之機宜愜至公之正道則萬物咸伏無敢妄動名曰定基君臣之道貴其公正若能動用合其天機應運同其天道此則人安其心物安其體五行安其位嶽瀆安其靈上施道德下行仁義灾害不生禍亂不作天人靜默名曰定基性有巧拙可以伏藏人之巧拙不可顯露慎之擇善无令患生也䟽曰人懷性智巧拙賢愚悉共有之但少而言之人有少巧智辯慧便馳騁顯露不料得失顯招其咎者何也爲不能隱密不自誡慎以致傾敗耳故道德經云大辯若訥大巧若拙其言隱密也易曰君不密則失臣臣不密則失身機事不密則害成此之謂也可以伏藏者賢人君子縱有巧智辯慧之性博學多聞之才動靜合其機宜可不爲巧乎常能隱伏藏匿巨細用之恐被嫉佞讒毁反招其咎耳況愚拙之人自率於心造次興動不自藏隱立招禍患賢人養道育德巧拙之性俱隱伏於身心然後内觀正性外視邪淫善則行之不善則捨之修身鍊行而成聖人外人焉能知我巧拙之性乎皆謂我天然賢聖不知我修而致之故曰伏藏也九竅之邪在乎三要可以動靜言人九竅俱邪皆能生患在於要者耳目口也切使誡慎无令禍生疏曰南華云人有百骸九竅五臟體而存之人禀五炁而成形頭圓足方四肢五臟三魂七魄遞生邪正互爲君臣在身通流運動者九竅也邪正禍福之急者在三要焉即耳目口也故道德經云五色令人目盲五音令人耳聾五味令人口爽是也道德之士眼不視邪色耳不聽邪聲口不談邪事所以正事則視聽言談之此名動也涉其邪妄悉不將心視聽言說此名靜也宣尼云擇其善者而從之此名動也擇其不善者而改之在此名靜也孝經云言滿天下無口過行滿天下無怨惡者所縁身心靜正而無邪惡以致此也但遇善即動逢邪即靜此則身無禍患皆在耳目口之防慎故云在乎三要耳可以動可以靜也火生於木禍發必剋奸生於國時動必潰知之修鍊謂之聖人姦火喻人之性木國喻人之身使人治國安身而今姦火不發然後修身鍊行以成聖人疏曰此一科言聖意興其喻也爲上文九邪三要動靜之宜切令戒慎恐未能窮理盡性故興此火木姦國爲令喻殷勤修鍊以成聖人木中有火者喻人中有邪惡之性五毒之火也太公注云廣成子以爲積火焚五毒故知火者猛烈之炁書云火炎崑岡玉石俱焚矣木中藏火慎勿鑽研火發則木焚矣身中邪毒忽縱恣之則萬善俱滅其身潰矣姦生於國時動必潰者凡有國則有姦臣賊子包藏害心思圖篡奪苟欲富貴如此之類不一皆潛藏國中人君不可知之但君懷道德臣效忠貞時自雍和天下寧泰姦人徒有其心無由妄敢興動皆候其時合動安得君道失臣道喪兵水旱蝗徵斂苛刻人心變易思亂怨上當此之代萬物皆有亂心何況懷姦之人乎又姦者不一乘此隳敗之時則諸奸競發其國得不潰乎此喻上之九竅三要巧拙動靜也言人有道德定慧隱伏身心之中諸邪淫穢僻亦不能興耳若邪競發則身潰矣故以姦火藏於木國以喻邪正伏於身心此唯賢哲之士通詳其文曉達明悟精念至道去惡存善是名知之修鍊謂之聖人故曰上有神仙抱一之道黄帝得之以登雲天湯武得之以王天下驪山母云聖人學之得其道爲順天時則内懷道德外任賢良知之修鍊而成聖人是得其道以昇雲天黄帝是也賢人學之得其法爲依五行之善正不違天時不逆地理不傷財不害物富國安人身爲賢明乃得其法道德之君堯舜是也智人學之得其術爲用天之道分地之利謹身節用以養父母仁義禮智信忠孝君親貞廉不失保其禄位是得其術賢臣䕫龍伊尹是也小人學之得其殃爲將天道之炁不習善之用以智巧辯慧之性專事三反晝夜煩兵黷武陰謀屠害苟求奢榮傾奪於世雖暫富貴不思禍之將至反招敗亡延及後世是得其殃也禄山思明篡逆悖亂之臣是也聖母又言此文深奥若巨海之朝百谷含弘萬象妙義靈也此神仙抱一演道章上一百五言使人明陰陽之道察興廢之理動用其機宜然後修身鍊行以成聖人故曰上有神仙抱一之道讚曰天道應運陰陽至神察其機要存亡在身悟者爲正迷則非眞知之修鍊謂之聖人黄帝陰符經疏卷上
