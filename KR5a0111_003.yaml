front:
  text: 黃帝陰符經疏卷下閏三
  hash: sha256:05fe0a93759ddb800a144da7562cbbe0748a4000814a228ec8c1a7abfc8a0343
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0111_HFL_003-001a, image: hfl/0055/0055-050.png}
body:
  text: 少室山李筌疏強兵戰勝演術章瞽者善聽聾者善視絶利一源用師十倍三反晝夜用師萬倍絶利者塞耳則視明閉目則聽審務使身心不亂主事精專也疏曰言人眼貪色則耳不聞正聲聽淫聲則目不睹正色此視聽二徒俱主於心也道德之士心無邪妄雖耳目聞見萬種聲色其心正定都無愛悅貪著之心與無耳目不殊何必在於聾瞽者哉但心中納正則耳目無邪耳目無邪則身心不亂身心不亂則精思舉事發機皆合於天道比之凡情十倍利益事皆成遂何必獨在用師他皆倣此三反晝夜用師萬倍者上云身心正定耳目聰明舉事發機比常十倍就中更能三思反覆日夜精專舉事發機比常情萬倍何必獨在用師也論語云三思而後行再斯而可矣使人用心必須精審此之義也所言師者兵也兵者凶器戰者危事處戰爭之地危亡之際必須三反精思深謀遠略若寡於謀慮輕為進退竟致敗亡所以將此耳目精思引以用師為喻切令修鍊保護其身非真用師也道德之士嫉惡如讎知此耳目絶利之源三反精思之義深沉審細理正居貞誅鋤邪佞之賊自固其躬久久成道則黃帝滅蚩尤是也至如古今名將孫吳韓白武侯衛公皆善用師悉能三反晝夜成功立事以致榮華然終謂強兵戰勝之術以為輕命之機必也黃帝得之以登雲天傅説得之以處玄枵也故上文云君子得之固躬小人得之輕命心生於物死於物機在目心貪於物者損壽目視無厭則意荒但戒目收心則無禍敗之患也疏曰道德之士心不妄生機不妄動輒加於物情而耽徇之人取萬物資身養命者亦天然之理但不令越分乖宜反傷其性故元倉子言萬人操弓共射一招招無不中招垛也亦云招箭人也萬物彰彰以害一生生無不傷者以養性命也今代之惑者多以性養物不知休息此言心生貪婪為物所盜使人禍敗耳家語云嗜欲無厭貪求不止者刑其殺之老子云知足不辱知止不殆可以長久所貴知足適其中不令將心苦貪於物反傷正性必害於人故劉子云火林養鳥溫湯養魚之義以生於物死於物也機在目者言人動生妄心加於物者皆由自睹而心生故云機在目欲令戒慎其目勿令妄視邪淫之色使心於物不生妄動之機不撓其性以固壽保躬也天之無恩而大恩生天地生而不有為而不恃長養萬物不求恩報而萬物感其覆育自有恩生疏曰天地萬物自然有之此皆至道之所含育不求恩報於萬物萬物承天之覆育自懷恩於天故老子言生而不有為而不恃長而不宰迅雷烈風莫不蠢然迅雷烈風陰陽動用人自懷懼蠢然而驚疏曰迅雷者陰陽激搏之聲也烈風者莊子言大塊噫氣其名為風凡此風雷陰陽自有本不威人人自畏之莫不蠢然而動懷驚懼也此言道德之君撫育萬靈同天地之不仁則大地人民禽獸草木皆自歸恩於君感戴如天各守其分各安其業無不逍遙也明君但施其正令以示國章兆人睹其威命如迅雷烈風莫不蠢然而動咸生恐懼之心各自警戒各自慎行也以此治軍則將勇兵強上威下懼必能誅暴定亂故言下有強兵戰勝之術也至樂性餘至靜則廉至尚廉靜則心無憂懼情懷悅樂而逍遙有餘疏曰至樂者非絲竹歡娛之樂也若以此樂必無餘故家語云至樂無聲而天下之人安三略云有道之君以樂樂人此言賢人君子以心平性正不欺於物不徇於時理國安家無淫刑濫罰不越國章身無過犯無所憂懼自然心懷悅樂情性怡逸逍遙有餘豈將絲竹歡宴之樂而方比此樂乎至如古人鼓琴拾穗行歌待終故曰至樂性餘也至靜則廉者既不為小人絲竹奢淫之樂自保其無憂無事之歡如此則不為聲色所撓而性靜情逸神貞志廉也亢倉子曰貴則語通富則身通窮則意通靜則神通引此四通之體義存乎一故謂至樂至靜也人能至靜可致神通是名至靜則廉也夫將帥之體貴其廉靜杜其喧撓賞罰不差父子為軍心懷悅樂性多餘勇然可摧凶剋敵功業必成故曰下有強兵戰勝之術也夫能棲神靜樂之間謂之守中六情不染二景常然天之至私用之至公天道幽隱不可窺測至私也萬物生成聖功顯著至公也疏曰天者至道也言至道包含萬類幽深恍惚無有形段不可窺測是名至私私者隱匿之義也能於杳冥之中應用無窮生成萬物各具形體隨用立名乃至公也公者明白顯用衆可觀之義也此言道德之君智慮廣博包總萬機智謀巧拙進退可否悉能私隱於深心人不可得而窺之是至私也及其動用觀善惡察是非施政令行賞罰顯然明白為天下之可觀乃至公也故曰天之至私用之至公也為軍帥之體能用以隱密機數難窺取捨如神威恩顯著上清下正將勇兵強剋敵摧凶功業盛茂故曰下有強兵戰勝之術也禽之制在氣鵬摶九萬積氣而升蜩鳩搶揄決起而上皆能制氣進退而自由也疏曰禽者羽化百鳥之類也氣者天地陰陽之氣也人之運動皆以手足進退為利禽鳥運動皆以翅羽鼓氣心動翅鼓無所不之上下由之況人最靈不能善用天機道德之氣固躬養命以致長生久視乎若人善能制道德之氣則遨遊太虛禽鳥不足比也為軍帥之體善用五行休王之氣能知陰陽制伏之源則摧凶剋敵不足為難故曰下有強兵戰勝之術者也生者死之根死者生之根愚人徇物而貪生違生之理者促壽賢人損己以求道德其妙者固躬而不亡疏曰此言人之在世貪生惡死皆自厚養其身恐致滅亡也鞠養身命必須飲食衣服此亦天然自合之理故莊子言耕而食織而衣其德不離織而衣耕而食是謂同德故知人生必資衣食之育養也然在於儉約處中則吉若縱恣奢溢過分則凶而反害其生也至若上古之人巢居穴處情性質朴亦不知有長生短促之理任自然而逍遙年壽長永後代真源道喪浮薄將興廣設華宇衣服紈綵滋味肴膳越分怡養恐身之不康殊不知養之太過役心損慮反招禍患為促壽之根本故曰生者死之根死者生之根者至如道德之士損己忘劬以求長生之術或則餐霞服氣辟穀休糧心若死灰形同稿木世人觀之必死之象殊不知長生之根本也故曰死者生之根也夫將帥之體能知幸生即死必死而反生者則全軍保衆為良將焉故兵術曰致兵於死地而反生此是強兵戰勝之術也莊子曰方生方死方死方生也恩生於害害生於恩君子勉善而感恩恩生於害也小人辜恩而起害害生於恩也疏曰此言人心向背恩害互生也本來無害亦無恩因救害而有恩則恩生於害至如賢人君子小有患難得人拯拔懷恩感激終身不忘是恩生於害也至如小人承君子之上恩顧身居榮祿不能戒慎終始保守一朝恃寵失權身陷刑網不知己過反生怨害此曰害生於恩道德之士感天地覆育之恩不辜至道生成之德修善行正反朴還元則無害可生於恩恩亦無由生於害不將恩害以撓性守靜默以生淳和至如恩害相生寵辱更致者小人之道也為將帥之體不負皇恩不驕榮寵慎終如始保守恩光竭力盡忠成功立事恩亦無由生於害害亦無由起於恩以道德臨戎有征無戰豈不美哉故云下有強兵戰勝之術也愚人以天地文理聖我以時物文理哲愚人見星流日暈風雨雷電水旱災蝗而生憂懼殊不知君臣道德政理淳和矣安撫黎人轉禍為福以此時物文理哲唯聖我知之者矣故天地懸日月以照善惡垂列宿以示吉凶皆道德自然之理矣愚人仰視三光觀天文之變易睹雷電之震怒或寒暑不節或水旱蟲蝗恐禍及身悉懷憂懼愚人以此為天地文理聖也時物文理者但君懷廉靜臣效忠貞獹鵲不喧邊烽無燧兆人康樂寰宇寧泰縱天地災祥無能為也聖我以此為時物文理者故家語云殷太戊之時道缺法邪以致之孽桑穀忽生於朝七日大拱占者曰桑穀野木合生於郊今生於朝國亡矣太戊恐懼側身修德思君臣之政明養人之道三年之後遠方慕義重譯而至十有六國則桑穀無能為災夫子曰存亡禍福皆在於己天災地妖不能加也則妖禍不勝善政怪夢不勝善行又堯遭洪水九年湯遭大旱七載兆庶和平人無飢色何者為君有道政理均和主信臣忠百姓戴上雖有水旱不能為災也水旱者天地也文理者時物也若明時物之理者皆能轉禍為福易死而生故曰我有時物文理哲夫為軍帥之體日暈五色星流四維怪獸衝營野鳥入室以天地文理示其災祥但能修政令設謀慮思撫士卒轉禍為福則敵何敢當此乃時物文理哲也故曰下有強兵戰勝之術也下章一百三言皆使人深思靜慮恩害不生曉達存亡公私隱密開物成務觀天相時故曰下有強兵戰勝之術也讚曰絶利一源三思反覆徇物之機生死在目樂出安靜恩生害酷天地災祥時理為福自然之道靜故天地萬物生天地之道浸故陰陽勝良曰天地之道浸微而唯勝者也陰陽相推而變化順矣良曰言陰陽相推激至於自化在於目乎是故聖人知自然之不可為因以制之亮曰深矣善矣天人見之為自然英雄見之為制愚人見之為化也至靜之道律曆所不能契鳥獸之謂也良曰鳥獸之靜曆不能機也爰有奇器是生萬象八卦甲子萬一決也神樞詭藏六癸即玄女符也陰陽相勝之術昭昭乎進乎象矣此七十言理盡不疏也黃帝陰符經疏卷下
